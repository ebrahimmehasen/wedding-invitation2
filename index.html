<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay">
        <div class="content">
            
            <h1 class="names" id="names-display">Taylor & Estelle</h1>
            
            <div class="date-block">
                <div class="month" id="display-month">MAY</div>
                <div class="date-row">
                    <div class="side-text">
                        <hr>
                        <span id="display-day-name">SUNDAY</span>
                        <hr>
                    </div>
                    <div class="day-number" id="display-day-number">25</div>
                    <div class="side-text">
                        <hr>
                        <span id="display-time">AT 07:00 PM</span>
                        <hr>
                    </div>
                </div>
                <div class="year" id="display-year">2025</div>
            </div>

            <p class="invite-text">
                WE INVITE YOU TO WITNESS THE BEGINNING OF<br>OUR FOREVER, TOGETHER WITH OUR FAMILIES.
            </p>

            <div class="location-details">
                <p id="hotel-name">BORCELLE HOTEL</p>
                <p id="hotel-address1">123 Anywhere ST., Any City,</p>
                <p id="hotel-address2">ST 12345</p>
            </div>

            <div class="countdown-container">
                <div class="countdown-item">
                    <span id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="countdown-item">
                    <span id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="countdown-item">
                    <span id="minutes">00</span>
                    <span class="label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span id="seconds">00</span>
                    <span class="label">Seconds</span>
                </div>
            </div>

            <a href="#" id="location-btn" target="_blank" class="location-btn">View Location</a>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
